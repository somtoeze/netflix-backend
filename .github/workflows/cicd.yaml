name: Build and push docker image

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v2


    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          AWS_DEFAULT_REGION: ${{ Global }}
# Login to ECR
#=============
    - name: Login to ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2


    - name: Docker build 
      run: |
        echo "${{ vars.APPLICATION_PROPERTIES }}" > application.properties
        # ls -la 
        # cat application.properties
        docker build -t netflix_backend:latest .

    - name: Docker push
      run: |
        docker tag backend:latest 660119432667.dkr.ecr.us-east-1.amazonaws.com/backend:latest
        docker push 660119432667.dkr.ecr.us-east-1.amazonaws.com/backend:latest

